<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioTech - Biblioteca Virtual</title>
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <header class="app-header">
        <div class="header-container">
            <div class="logo-area">
                <span class="logo-icon">📚</span>
                <h1 class="logo-text">BiblioTech</h1>
            </div>
            
            <div class="search-bar-container">
                <input type="text" id="search-input" placeholder="Buscar por título, autor o género..." aria-label="Buscar libros">
                <span class="search-icon">🔍</span>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="section-header">
            <h2 class="section-title">Catálogo de Libros</h2>
            <div class="header-actions">
                <button id="add-book-btn" class="btn-primary">➕ Agregar Libro</button>
            </div>
        </section>

        <div class="books-container grid-view" id="books-grid">
            <!-- Las tarjetas de libros se generarán dinámicamente aquí -->
        </div>
    </main>

    <!-- Modal para Agregar Libro -->
    <div class="modal-overlay" id="add-book-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Agregar Nuevo Libro</h3>
                <button class="modal-close-btn" id="close-modal-btn">&times;</button>
            </div>
            <form id="add-book-form" class="modal-form">
                <div class="form-group">
                    <label for="book-title-input">Título</label>
                    <input type="text" id="book-title-input" required placeholder="Ej. El Alquimista">
                </div>
                <div class="form-group">
                    <label for="book-author-input">Autor</label>
                    <input type="text" id="book-author-input" required placeholder="Ej. Paulo Coelho">
                </div>
                <div class="form-group">
                    <label for="book-genre-input">Género</label>
                    <input type="text" id="book-genre-input" required placeholder="Ej. Novela, Drama">
                </div>
                <div class="form-group">
                    <label for="book-year-input">Año de Publicación</label>
                    <input type="number" id="book-year-input" required placeholder="Ej. 1988">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancel-modal-btn">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar Libro</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="app-footer">
        <p>&copy; 2026 BiblioTech. Todos los derechos reservados.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
